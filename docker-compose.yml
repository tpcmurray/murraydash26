name: murraydash

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY}
      GOOGLE_CALENDAR_TERRY_EMAIL: ${GOOGLE_CALENDAR_TERRY_EMAIL}
      GOOGLE_CALENDAR_NICOLE_EMAIL: ${GOOGLE_CALENDAR_NICOLE_EMAIL}
      GOOGLE_CALENDAR_SKYLAR_EMAIL: ${GOOGLE_CALENDAR_SKYLAR_EMAIL}
      GOOGLE_CALENDAR_ADDISON_EMAIL: ${GOOGLE_CALENDAR_ADDISON_EMAIL}
      GOOGLE_CALENDAR_FAMILY_EMAIL: ${GOOGLE_CALENDAR_FAMILY_EMAIL}
    ports:
      - "3100:3100"
    networks:
      - ironlog-net

networks:
  ironlog-net:
    external: true
